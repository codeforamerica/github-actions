name: Security Scan

on:
  workflow_call:
    inputs:
      path:
        description: "Filesystem path to scan"
        type: string
        required: false
        default: "./"

jobs:
  grype-scan:
    name: Grype Scan (vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for vulnerabilities
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        continue-on-error: true
        with:
          path: ${{ inputs.path }}
          fail-build: true
          severity-cutoff: high
          output-format: json

      - name: Print Grype results
        run: cat ${{ steps.grype.outputs.json }} | jq .

      - name: Post Grype results to PR
        if: github.event_name == 'pull_request' && steps.grype.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const severityDot = s => ({ CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🟢' }[s?.toUpperCase()] ?? '⚪');
            const { matches } = JSON.parse(fs.readFileSync('${{ steps.grype.outputs.json }}', 'utf8'));
            const rows = (matches ?? []).map(m => {
              const fixedIn = m.vulnerability.fix?.versions?.join(', ') || '—';
              const sev = m.vulnerability.severity?.toUpperCase();
              return `| ${m.artifact.name} | ${m.artifact.version} | ${fixedIn} | ${m.artifact.type} | ${m.vulnerability.id} | ${severityDot(sev)} ${sev} |`;
            });
            const table = [
              '| Package Name | Installed | Fixed In | Type | Vulnerability | Severity |',
              '|--------------|-----------|----------|------|---------------|----------|',
              ...rows,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
                ### ❌ Vulnerability Scan (Grype) Failed\n
                *Resolve all CRITICAL and HIGH severity issues before proceeding.*\n\n
                ${table}\n\n
                [View Grype job output](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `,
            });

      - name: Fail if vulnerabilities found
        if: steps.grype.outcome == 'failure'
        run: exit 1

  trivy-scan:
    name: Trivy Scan (secrets, misconfigurations)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ${{ inputs.path }}
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          list-all-pkgs: false
          format: json
          output: trivy-results.json

      - name: Print Trivy results
        run: cat trivy-results.json | jq .

      - name: Post Trivy results to PR
        if: github.event_name == 'pull_request' && steps.trivy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const severityDot = s => ({ CRITICAL: '🔴', HIGH: '🟠', MEDIUM: '🟡', LOW: '🟢' }[s?.toUpperCase()] ?? '⚪');
            const { Results } = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
            const rows = [];
            for (const result of Results ?? []) {
              for (const m of result.Secrets ?? [])
                rows.push(`| ${result.Target} | ${m.Title} | ${severityDot(m.Severity)} ${m.Severity} | |`);
              for (const m of result.Misconfigurations ?? [])
                rows.push(`| ${result.Target} | ${m.Title} | ${severityDot(m.Severity)} ${m.Severity} | ${m.PrimaryURL ?? '—'} |`);
            }
            const table = [
              '| Filename | Finding | Severity | Details |',
              '|----------|---------|----------|---------|',
              ...rows,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
                ### ❌ Security Scan (Trivy) Failed\n
                *Resolve all CRITICAL and HIGH severity issues before proceeding.*\n\n
                ${table}\n\n
                [View Trivy job output](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `,
            });

      - name: Fail if issues found
        if: steps.trivy.outcome == 'failure'
        run: exit 1
