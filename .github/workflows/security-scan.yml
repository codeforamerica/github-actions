name: Security Scan

on:
  workflow_call:
    inputs:
      path:
        description: "Filesystem path to scan"
        type: string
        required: false
        default: "./"
      skip-vuln:
        description: "Skip the Grype vulnerability scan"
        type: boolean
        required: false
        default: false

jobs:
  grype-scan:
    name: Grype Scan (vulnerabilities)
    if: ${{ !inputs.skip-vuln }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Scan for vulnerabilities
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        continue-on-error: true
        with:
          path: ${{ inputs.path }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Annotate PR with Grype results
        if: github.event_name == 'pull_request'
        uses: jontyms/sarif-annotations@4cf91f33600ae6d96dfab32e5f9e30621ebfac9a # v0.0.3
        with:
          sarif-file: ${{ steps.grype.outputs.sarif }}

      - name: Generate Grype markdown report
        id: grype-report
        if: github.event_name == 'pull_request' && steps.grype.outcome == 'failure'
        run: |
          curl -sSL https://github.com/fulgas/sarif-to-md-rs/releases/download/v1.2.0/sarif-to-md-1.2.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv sarif-to-md /usr/local/bin/
          {
            echo "body<<GRYPE_EOF"
            sarif-to-md -i ${{ steps.grype.outputs.sarif }} -f github-flavored -e
            echo "GRYPE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Post Grype results to PR
        if: github.event_name == 'pull_request' && steps.grype.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.grype-report.outputs.body }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ❌ Vulnerability Scan (Grype) Failed\n\nResolve all CRITICAL and HIGH severity findings before proceeding.\n\n${process.env.REPORT_BODY}\n\n[View Grype job output](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

      - name: Upload Grype SARIF to GitHub Advanced Security
        if: github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype

      - name: Fail if vulnerabilities found
        if: steps.grype.outcome == 'failure'
        run: exit 1

  trivy-scan:
    name: Trivy Scan (secrets, misconfigurations)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: ${{ inputs.path }}
          scanners: secret,misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL
          list-all-pkgs: false
          format: sarif
          output: trivy-results.sarif

      - name: Annotate PR with Trivy results
        if: github.event_name == 'pull_request'
        uses: jontyms/sarif-annotations@4cf91f33600ae6d96dfab32e5f9e30621ebfac9a # v0.0.3
        with:
          sarif-file: trivy-results.sarif

      - name: Generate Trivy markdown report
        id: trivy-report
        if: github.event_name == 'pull_request' && steps.trivy.outcome == 'failure'
        run: |
          curl -sSL https://github.com/fulgas/sarif-to-md-rs/releases/download/v1.2.0/sarif-to-md-1.2.0-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo mv sarif-to-md /usr/local/bin/
          {
            echo "body<<TRIVY_EOF"
            sarif-to-md -i trivy-results.sarif -f github-flavored -e
            echo "TRIVY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Post Trivy results to PR
        if: github.event_name == 'pull_request' && steps.trivy.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          REPORT_BODY: ${{ steps.trivy-report.outputs.body }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### ❌ Security Scan (Trivy) Failed\n\nResolve all CRITICAL and HIGH severity findings before proceeding.\n\n${process.env.REPORT_BODY}\n\n[View Trivy job output](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

      - name: Upload Trivy SARIF to GitHub Advanced Security
        if: github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Fail if issues found
        if: steps.trivy.outcome == 'failure'
        run: exit 1
