name: Trivy Analysis

on:
  workflow_call:
    inputs:
      path:
        description: "Filesystem path to scan"
        type: string
        required: false
        default: "./"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Check available security features
        id: security-features
        uses: codeforamerica/github-actions/.github/actions/security-features@main
      - name: Run Trivy vulnerability scanner
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          format: sarif
          output: trivy.sarif
          scan-ref: ${{ inputs.path }}
          scan-type: fs
          trivy-config: trivy.yaml
      - name: Parse SARIF file for annotations
        if: always()
        # v1.0.5
        uses: Miragon/sarif-report-parse@35fad652d9d39999c7df647e69610a441ceb4ccd
        with:
          severity-level: low
          sarif-file: trivy.sarif
      # When SARIF uploads are supported, upload the SARIF file to GitHub.
      - name: Upload SARIF result
        if: always() && steps.security-features.outputs.sarif == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
